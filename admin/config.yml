backend:
  name: github
  repo: bksmpalhikmahsby-crypto/jalur-tumbuh
  branch: main
  base_url: https://sveltia-cms-auth.bk-smp-alhikmahsby.workers.dev
  auth_endpoint: auth

publish_mode: simple
media_folder: "css/uploads"
public_folder: "/css/uploads"

collections:
  - name: "materi"
    label: "Materi Layanan Klasikal"
    folder: "content/materi"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nomor Urut (2 digit, contoh 07)", name: "num", widget: "string" }
      - { label: "Judul Materi", name: "title", widget: "string" }
      - { label: "Ringkasan", name: "ringkasan", widget: "text" }
      - label: "Link-link Materi (Slide / Alat Ukur / Drive, bisa lebih dari satu)"
        name: "links"
        widget: "list"
        required: false
        fields:
          - { label: "Nama Link (contoh: Slide Materi, Alat Ukur MBTI)", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }

  - name: "video"
    label: "Video YouTube"
    folder: "content/video"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul Video", name: "judul", widget: "string" }
      - { label: "Link YouTube", name: "youtube_url", widget: "string" }
      - label: "Materi Terkait (isi Nomor Urut materi, contoh 01)"
        name: "materi_terkait"
        widget: "string"
        required: false

  - name: "profil"
    label: "Profil Tim BK"
    folder: "content/profil"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nama Lengkap & Gelar", name: "nama", widget: "string" }
      - { label: "Inisial (2 huruf untuk avatar, dipakai jika foto belum diisi)", name: "inisial", widget: "string" }
      - label: "Foto (opsional)"
        name: "foto"
        widget: "image"
        required: false
      - { label: "Nomor WhatsApp (format 08...)", name: "whatsapp", widget: "string" }
      - { label: "Urutan Tampil (angka)", name: "urutan", widget: "number" }

  - name: "berita"
    label: "Berita & Informasi"
    folder: "content/berita"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul Berita", name: "judul", widget: "string" }
      - { label: "Tanggal", name: "tanggal", widget: "datetime" }
      - { label: "Ringkasan Singkat", name: "ringkasan", widget: "text" }
      - { label: "Isi Lengkap (opsional)", name: "body", widget: "markdown", required: false }
