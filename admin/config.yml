backend:
  name: github
  repo: bksmpalhikmahsby-crypto/jalur-tumbuh
  branch: main
  base_url: https://sveltia-cms-auth.bk-smp-alhikmahsby.workers.dev
  auth_endpoint: auth

publish_mode: simple
media_folder: "css/uploads"
public_folder: "/css/uploads"

collections:
  - name: "pengaturan"
    label: "Pengaturan Beranda"
    files:
      - name: "site"
        label: "Teks Beranda"
        file: "content/site.md"
        fields:
          - { label: "Hero — Label kecil di atas judul", name: "hero_eyebrow", widget: "string" }
          - { label: "Hero — Judul baris 1", name: "hero_judul_1", widget: "string" }
          - { label: "Hero — Judul baris 2 (miring/oranye)", name: "hero_judul_2", widget: "string" }
          - { label: "Hero — Deskripsi", name: "hero_deskripsi", widget: "text" }
          - { label: "Hero — Teks tombol 1", name: "hero_tombol_1", widget: "string" }
          - { label: "Hero — Teks tombol 2", name: "hero_tombol_2", widget: "string" }
          - { label: "Ayat — Teks Arab", name: "ayat_arab", widget: "string" }
          - { label: "Ayat — Arti/terjemahan", name: "ayat_arti", widget: "string" }
          - { label: "Ayat — Sumber (contoh: QS. Taha: 114)", name: "ayat_sumber", widget: "string" }
          - { label: "Tim BK — Label kecil", name: "profil_eyebrow", widget: "string" }
          - { label: "Tim BK — Judul", name: "profil_judul", widget: "string" }
          - { label: "Tim BK — Deskripsi", name: "profil_deskripsi", widget: "text" }
          - { label: "Materi — Label kecil", name: "materi_eyebrow", widget: "string" }
          - { label: "Materi — Judul", name: "materi_judul", widget: "string" }
          - { label: "Materi — Deskripsi", name: "materi_deskripsi", widget: "text" }
          - { label: "Berita — Label kecil", name: "berita_eyebrow", widget: "string" }
          - { label: "Berita — Judul", name: "berita_judul", widget: "string" }
          - { label: "Media Sosial — Label kecil", name: "sosmed_eyebrow", widget: "string" }
          - { label: "Media Sosial — Judul", name: "sosmed_judul", widget: "string" }
          - { label: "Media Sosial — Judul bagian Video", name: "video_heading", widget: "string" }
          - { label: "Konsultasi — Label kecil", name: "info_eyebrow", widget: "string" }
          - { label: "Konsultasi — Judul", name: "info_judul", widget: "string" }
          - { label: "Konsultasi — Deskripsi/instruksi", name: "info_deskripsi", widget: "text" }
          - { label: "Konsultasi — Lokasi", name: "info_lokasi", widget: "string" }
          - { label: "Footer — Teks hak cipta", name: "footer_teks", widget: "string" }

  - name: "materi"
    label: "Materi Layanan Klasikal"
    folder: "content/materi"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nomor Urut (2 digit, contoh 07)", name: "num", widget: "string" }
      - { label: "Judul Materi", name: "title", widget: "string" }
      - { label: "Ringkasan", name: "ringkasan", widget: "text" }
      - label: "Link-link Materi (Slide / Alat Ukur / Drive, bisa lebih dari satu)"
        name: "links"
        widget: "list"
        required: false
        fields:
          - { label: "Nama Link (contoh: Slide Materi, Alat Ukur MBTI)", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }

  - name: "video"
    label: "Video YouTube"
    folder: "content/video"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul Video", name: "judul", widget: "string" }
      - { label: "Link YouTube", name: "youtube_url", widget: "string" }
      - label: "Materi Terkait (isi Nomor Urut materi, contoh 01)"
        name: "materi_terkait"
        widget: "string"
        required: false

  - name: "profil"
    label: "Profil Tim BK"
    folder: "content/profil"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nama Lengkap & Gelar", name: "nama", widget: "string" }
      - { label: "Inisial (2 huruf untuk avatar, dipakai jika foto belum diisi)", name: "inisial", widget: "string" }
      - label: "Foto (opsional)"
        name: "foto"
        widget: "image"
        required: false
      - { label: "Nomor WhatsApp (format 08...)", name: "whatsapp", widget: "string" }
      - { label: "Urutan Tampil (angka)", name: "urutan", widget: "number" }

  - name: "berita"
    label: "Berita & Informasi"
    folder: "content/berita"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul Berita", name: "judul", widget: "string" }
      - { label: "Tanggal", name: "tanggal", widget: "datetime" }
      - { label: "Ringkasan Singkat", name: "ringkasan", widget: "text" }
      - { label: "Isi Lengkap (opsional)", name: "body", widget: "markdown", required: false }
