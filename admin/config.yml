backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "css/uploads"
public_folder: "/css/uploads"

collections:
  - name: "materi"
    label: "Materi Layanan Klasikal"
    folder: "content/materi"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nomor Urut (2 digit, contoh 07)", name: "num", widget: "string" }
      - { label: "Judul Materi", name: "title", widget: "string" }
      - { label: "Ringkasan", name: "ringkasan", widget: "text" }
      - { label: "Link Materi (Slide/PDF/Drive)", name: "link", widget: "string", required: false }

  - name: "profil"
    label: "Profil Tim BK"
    folder: "content/profil"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nama Lengkap & Gelar", name: "nama", widget: "string" }
      - { label: "Inisial (2 huruf untuk avatar)", name: "inisial", widget: "string" }
      - { label: "Nomor WhatsApp (format 08...)", name: "whatsapp", widget: "string" }
      - { label: "Urutan Tampil (angka)", name: "urutan", widget: "number" }

  - name: "berita"
    label: "Berita & Informasi"
    folder: "content/berita"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul Berita", name: "judul", widget: "string" }
      - { label: "Tanggal", name: "tanggal", widget: "datetime" }
      - { label: "Ringkasan Singkat", name: "ringkasan", widget: "text" }
      - { label: "Isi Lengkap (opsional)", name: "body", widget: "markdown", required: false }
